name: Branch build and release

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Install Playwright Chromium dependencies
        if: runner.os == 'Linux'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright Chromium
        if: runner.os != 'Linux'
        run: npx playwright install chromium

      - name: Run integration test
        run: npm run test:integration

      - name: Upload release artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: artifacts/

  create-release:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/release'
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: artifacts

      - name: Derive release version
        id: version
        shell: bash
        run: |
          BASE_VERSION="$(node -p "require('./package.json').version")"
          RELEASE_VERSION="$(node -e "const [major, minor] = process.argv[1].split('.'); process.stdout.write([major, minor, process.argv[2]].join('.'));" "$BASE_VERSION" "${GITHUB_RUN_NUMBER}")"

          echo "base_version=${BASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Apply release version
        run: npm version "${{ steps.version.outputs.release_version }}" --no-git-tag-version

      - name: Create npm package
        id: package
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.release_version }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="v${VERSION}-${SHORT_SHA}"
          PACKAGE_TGZ="$(npm pack --ignore-scripts --silent)"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "package_tgz=${PACKAGE_TGZ}" >> "$GITHUB_OUTPUT"

      - name: Debug publish context
        shell: bash
        env:
          GITHUB_REPOSITORY_VALUE: ${{ github.repository }}
          GITHUB_WORKFLOW_VALUE: ${{ github.workflow }}
          GITHUB_WORKFLOW_REF_VALUE: ${{ github.workflow_ref }}
          GITHUB_EVENT_NAME_VALUE: ${{ github.event_name }}
          GITHUB_REF_VALUE: ${{ github.ref }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
        run: |
          echo "github.repository=$GITHUB_REPOSITORY_VALUE"
          echo "github.workflow=$GITHUB_WORKFLOW_VALUE"
          echo "github.workflow_ref=$GITHUB_WORKFLOW_REF_VALUE"
          echo "github.event_name=$GITHUB_EVENT_NAME_VALUE"
          echo "github.ref=$GITHUB_REF_VALUE"
          echo "github.sha=$GITHUB_SHA_VALUE"
          echo "package.name=$(node -p "require('./package.json').name")"
          echo "package.repository.url=$(node -p "require('./package.json').repository.url")"

      - name: Publish to npm
        run: npm publish --ignore-scripts --access public

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${{ steps.package.outputs.tag }}" \
            "${{ steps.package.outputs.package_tgz }}" \
            artifacts/qr-scanner-worker.min.js \
            artifacts/qr-scanner-worker.min.js.map \
            artifacts/qr-scanner.legacy.min.js \
            artifacts/qr-scanner.legacy.min.js.map \
            artifacts/qr-scanner.min.js \
            artifacts/qr-scanner.min.js.map \
            artifacts/qr-scanner.umd.min.js \
            artifacts/qr-scanner.umd.min.js.map \
            artifacts/types/qr-scanner.d.ts \
            --target "${GITHUB_SHA}" \
            --title "qr-scanner v${{ steps.package.outputs.version }} (${{ steps.package.outputs.short_sha }})" \
            --generate-notes
